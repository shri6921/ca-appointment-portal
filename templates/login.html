{% extends "base.html" %}

{% block title %}Login - CA FinConnect{% endblock %}

{% block content %}
<div class="auth-wrapper glass-card">
    <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Log in to manage your appointments & consultation schedules</p>
    </div>

    <form action="{{ url_for('login') }}" method="POST">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
    </form>

    <div style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary); font-size: 0.9rem;">
        Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent-blue); font-weight: 600;">Sign up here</a>
    </div>
</div>
{% endblock %}
